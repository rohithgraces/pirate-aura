        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f2;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            overflow: hidden;
        }
        .app-container {
            width: 100vw;
            max-width: none;
            height: 100dvh;
            min-height: 100dvh;
            background: white;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #202123;
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .header span {
            background: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f7f7f8;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            flex-direction: row-reverse;
        }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            flex-shrink: 0;
            font-weight: bold;
            color: white;
            font-size: 14px;
        }
        
        .user-avatar {
            background: linear-gradient(135deg, #19c37d, #17b171);
        }
        
        .ai-avatar {
            background: linear-gradient(135deg, #10a37f, #0d8c6c);
        }
        
        .text-bubble {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .user-bubble {
            background: linear-gradient(135deg, white, white);
            color: black;
            border-bottom-right-radius: 5px;
        }
        
        .ai-bubble {
            background: white;
            color: #333;
            border: 1px solid #e5e5e5;
            border-bottom-left-radius: 5px;
        }
        
        .input-container {
            padding: 18px;
            background: white;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
            align-items: stretch;
            flex-direction: column;
        }
        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .mic-status {
            font-size: 12px;
            color: #0f8b6d;
            font-weight: 600;
            white-space: nowrap;
            display: none;
        }
        .mic-status.active {
            display: inline-block;
            animation: micPulse 1.2s ease-in-out infinite;
            text-shadow: 0 0 8px rgba(15, 139, 109, 0.18);
        }
        @keyframes micPulse {
            0%, 100% {
                opacity: 0.55;
                transform: translateY(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-1px);
            }
        }
        .attachment-preview {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border: 1px solid #d9e2ea;
            border-radius: 14px;
            background: #f6faf8;
        }
        .attachment-preview[hidden] {
            display: none;
        }
        .attachment-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .attachment-thumb {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            background: #dfe8ee;
            flex-shrink: 0;
        }
        .attachment-file-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #dfe8ee;
            color: #2e4458;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .attachment-text {
            min-width: 0;
        }
        .attachment-name {
            font-size: 13px;
            font-weight: 600;
            color: #1f2d3a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .attachment-meta {
            font-size: 12px;
            color: #6c7b88;
        }
        .attachment-remove {
            background: transparent;
            border: none;
            color: #6c7b88;
            cursor: pointer;
            font-size: 13px;
            flex-shrink: 0;
        }
        
        #messageInput {
            flex: 1;
            padding: 16px 18px;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        #messageInput:focus {
            border-color: #19c37d;
            box-shadow: 0 0 0 3px rgba(25, 195, 125, 0.2);
        }
        
        #sendButton {
            background: linear-gradient(135deg, #19c37d, #17b171);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(25, 195, 125, 0.3);
        }
        
        #sendButton:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(25, 195, 125, 0.4);
        }
        
        #sendButton:active {
            transform: scale(0.98);
        }
        
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 15px;
            align-items: center;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #ccc;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
            40% { transform: translateY(-8px); opacity: 1; }
        }
        
        /* Scrollbar styling */
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-area::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        
        /* Mobile responsive */
        @media (max-width: 900px) {
            body {
                padding: 0;
            }

            .app-container {
                width: 100%;
                max-width: 100%;
                min-height: 100dvh;
                height: 100dvh;
            }
        }

        @media (max-width: 480px) {
            .app-container {
                height: 100dvh;
                border-radius: 0;
                max-width: 100%;
                min-height: 100dvh;
                width: 100%;
            }
            
            .text-bubble {
                max-width: 88%;
                font-size: 14px;
                padding: 12px 16px;
            }

            .message-content {
                max-width: 88%;
            }
            
            .avatar {
                width: 32px;
                height: 32px;
                font-size: 13px;
            }

            .input-container {
                padding: 12px 10px;
                gap: 8px;
            }

            .input-row {
                gap: 8px;
            }

            .mic-status {
                font-size: 11px;
            }

            #attachButton,
            #micButton {
                width: 38px;
                height: 38px;
                font-size: 14px;
            }

            #sendButton {
                width: 44px;
                height: 44px;
                font-size: 16px;
                flex-shrink: 0;
            }

            #messageInput {
                min-width: 0;
                padding: 13px 14px;
                font-size: 15px;
            }
        }

    <div class="app-container">
        <!-- Header -->
<div class="header">
    <span class="logo-emoji">☠️</span>
    <span class="brand-name">Pirate &#9875; Aura</span>

    <div class="header-actions">
        <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme">&#9789;</button>
            <div class="header-menu">
                <button id="menuToggle" class="icon-btn menu-toggle" type="button" aria-label="Open menu">&#8942;</button>
                <div id="headerMenu" class="menu-dropdown">
                    <button id="adminPanelButton" class="menu-item" type="button">Admin Panel</button>
                    <button id="newChatButton" class="menu-item" type="button">New Chat</button>
                    <button id="clearChatButton" class="menu-item" type="button">Clear Chat</button>
                </div>
            </div>
        </div>
</div>
        <!-- Chat Messages Area -->
        <div class="chat-area" id="chatArea">
            <!-- Messages will appear here -->
        </div>
        <!-- Input Area -->
        <div class="input-container">
            <div class="attachment-preview" id="attachmentPreview" hidden>
                <div class="attachment-info">
                    <div class="attachment-file-icon" id="attachmentIcon">FILE</div>
                    <img class="attachment-thumb" id="attachmentThumb" alt="Attachment preview" hidden>
                    <div class="attachment-text">
                        <div class="attachment-name" id="attachmentName"></div>
                        <div class="attachment-meta" id="attachmentMeta"></div>
                    </div>
                </div>
                <button class="attachment-remove" id="removeAttachmentButton" type="button">Remove</button>
            </div>
            <div class="input-row">
                <button id="attachButton" type="button" aria-label="Attach image or file">&#128206;</button>
                <input type="file" id="attachmentInput" accept="image/*,.txt,.csv,.json,.pdf">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Message ChatGPT..." 
                    autocomplete="off"
                >
                <button id="sendButton">&#10148;</button>
                <button id="micButton" type="button" aria-label="Start voice input">&#127908;</button>
                <span id="micStatus" class="mic-status">Listening...</span>
            </div>
        </div>
    </div>
    <script>
      // Text-to-Speech Function
function speak(text) {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 1; // Speed (0.5 slow, 1 normal, 1.5 fast)
        utterance.pitch = 1; // Voice pitch
        window.speechSynthesis.speak(utterance);
    }
}
        // DOM Elements
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const attachButton = document.getElementById('attachButton');
        const attachmentInput = document.getElementById('attachmentInput');
        const attachmentPreview = document.getElementById('attachmentPreview');
        const attachmentThumb = document.getElementById('attachmentThumb');
        const attachmentIcon = document.getElementById('attachmentIcon');
        const attachmentName = document.getElementById('attachmentName');
        const attachmentMeta = document.getElementById('attachmentMeta');
        const removeAttachmentButton = document.getElementById('removeAttachmentButton');
        const micStatus = document.getElementById('micStatus');
        
        // Voice Input Feature
const micButton = document.getElementById("micButton");
let recognition;
let isListening = false;

        function setMicIcon(listening = false) {
            micButton.innerHTML = listening ? '&#127911;' : '&#127908;';
            micStatus.classList.toggle('active', listening);
        }

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition && window.isSecureContext) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.lang = "en-IN";

    recognition.onresult = function(event) {
        const voiceText = event.results[0][0].transcript;
        messageInput.value = voiceText;
        setMicIcon(false);
        isListening = false;
        sendMessage();
    };

    recognition.onerror = function(event) {
        isListening = false;
        setMicIcon(false);

        if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
            alert('Microphone permission is blocked. Please allow microphone access in your browser settings.');
        } else if (event.error === 'no-speech') {
            alert('No speech was detected. Please try again and speak clearly.');

        async function ensureDatasetLoaded() {
            if (!datasetReadyPromise) {
                datasetReadyPromise = fetch('/api/dataset')
                    .then(async (response) => {
                        const data = await response.json().catch(() => ({}));
                        if (!response.ok) {
                            throw new Error(data.error || 'Could not load dataset');
                        }

                        datasetIntents = Array.isArray(data.dataset) ? data.dataset : [];
                        return datasetIntents;
                    })
                    .catch((error) => {
                        console.error('Dataset load failed:', error);
                        datasetIntents = [];
                        return datasetIntents;
                    });
            }

        // Load chat history from localStorage
        function loadChatHistory() {
            try {

                if (saved) {
                    chatHistory = JSON.parse(saved);
                    chatHistory.forEach(msg => {
                        displayMessage(msg.role, msg.content, false, {
                            attachment: msg.attachment || null,
                            imageUrl: msg.imageUrl || ''
                        });
                    });
                }
            } catch (e) {
                console.log("Could not load chat history");
            }

        // Save chat to localStorage

        function formatTimeStamp(date = new Date()) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function copyMessageText(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const originalLabel = button.textContent;
                button.textContent = 'Copied';
                setTimeout(() => {
                    button.textContent = originalLabel;
                }, 1200);
            }).catch(() => {
                alert('Copy failed. Please try again.');

        function getAttachmentSummary(attachmentMeta = {}) {
            if (!attachmentMeta || !attachmentMeta.name) {
                return '';

            return attachmentMeta.type
                ? `${attachmentMeta.type} • ${attachmentMeta.name}`
                : attachmentMeta.name;
        }

        function scrollChatToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function typeTextIntoElement(element, text, onDone) {
            let index = 0;
            const speed = text.length > 240 ? 8 : 16;

            function step() {
                index += 1;
                element.textContent = text.slice(0, index);
                scrollChatToBottom();

                if (index < text.length) {
                    setTimeout(step, speed);
                } else if (onDone) {
                    onDone();
                }
            }

            step();

        function buildAttachmentMeta(file, previewUrl = '') {
            if (!file) {
                return null;

            return {
                name: file.name,
                type: file.type || 'File',
                previewUrl: previewUrl || '',
                isImage: file.type.startsWith('image/')
            };

        function formatFileSize(bytes) {
            if (bytes < 1024) {
                return `${bytes} B`;
            }

            if (bytes < 1024 * 1024) {
                return `${(bytes / 1024).toFixed(1)} KB`;
            }

            return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;

        function renderAttachmentPreview(file) {
            attachmentPreview.hidden = false;
            attachmentName.textContent = file.name;
            attachmentMeta.textContent = `${file.type || 'File'} • ${formatFileSize(file.size)}`;

            pendingAttachmentPreviewUrl = '';

            if (file.type.startsWith('image/')) {
                pendingAttachmentPreviewUrl = URL.createObjectURL(file);
                attachmentThumb.src = pendingAttachmentPreviewUrl;
                attachmentThumb.hidden = false;

        // Send message function
        async function sendMessage() {

            // Validation

            clearPendingAttachment();
            
            // Show typing indicator

                        ? 'Generating image...'
                        : 'AI is typing...'
            );

                    const imageResult = await generateImageResponse(message);
                    removeTypingIndicator();
                    displayMessage('ai', imageResult.reply || 'I generated an image for you.', true, {
                        animate: true,
                        imageUrl: imageResult.imageUrl || ''
                    });

                removeTypingIndicator();
                displayMessage('ai', `Sorry, I encountered an error: ${error.message}`);

                // Re-enable input

                messageInput.disabled = false;
                sendButton.disabled = false;
